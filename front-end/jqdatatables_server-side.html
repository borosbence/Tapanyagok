<html lang="hu">
<head>
    <meta content="text/html; charset=utf-8" />
    <title>Tápanyagok</title>
    <script src="https://code.jquery.com/jquery-3.6.1.js" integrity="sha256-3zlB5s2uwoUzrXK3BT7AX3FyvojsraNFxCc2vC/7pNI=" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.12.1/css/jquery.dataTables.css">
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.12.1/js/jquery.dataTables.js"></script>
</head>
<body>
    <h1>jquery DataTables - Szerver oldal</h1>
    <table id="tapanyagok" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Név</th>
                <th>Energia</th>
                <th>Fehérje</th>
                <th>Zsír</th>
                <th>Szénhidrát</th>
            </tr>
        </thead>
    </table>
    <script>
        $(document).ready(function() {
            $('#tapanyagok').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: 'http://localhost:5000/api/Tapanyagok/server-side',
                    type: 'POST'
                },
                columns: [
                    { "data": "nev" },
                    { "data": "energia" },
                    { "data": "feherje" },
                    { "data": "zsir" },
                    { "data": "szenhidrat" },
                ],
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.11.3/i18n/hu.json"
                }
            });
        } );
    </script>
</body>
</html>
