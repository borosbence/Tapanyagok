<html lang="hu">
    <head>
        <meta content="text/html; charset=utf-8" />
        <title>Tápanyagok</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqgrid/5.6.0/css/ui.jqgrid.min.css" />

        <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jqgrid/5.6.0/js/i18n/grid.locale-hu.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jqgrid/5.6.0/js/jquery.jqGrid.min.js"></script>

    </head>
    <body>
        <h1>jqGrid példa</h1>
        
        <table id="gridMain"></table>
        <div id="pagernav"></div>
        <script>
            var API_URL = "http://localhost:5000/api/Tapanyagok/jqGrid";
            jQuery("#gridMain").jqGrid({
                    url: API_URL,
                    datatype: 'json',
                    mtype: 'GET',
                    pager: '#pagernav',
                    sortable: true,
                    viewrecords: true,
                    height: 500,
                    colModel: [
                        { label: 'Név', name: 'nev', index: 'nev', },
                        { label: 'Energia', name: 'energia', index: 'energia', /* search: false */},
                        { label: 'Fehérje', name: 'feherje', index: 'feherje' },
                        { label: 'Zsír', name: 'zsir', index: 'zsir' },
                        { label: 'Szénhidrát', name: 'szenhidrat', index: 'szenhidrat' },
                    ],
                    caption: "Tápanyagok",
                    autowidth: true,
                }).navGrid('#pagernav', {search:true, edit: false, add:false, del:false, searchtext:"Keresés"});;
        </script>
    </body>
</html>
